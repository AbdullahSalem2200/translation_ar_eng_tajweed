<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sheikh Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111111;
      --surface: #1a1a1a;
      --border:  #262626;
      --border2: #333333;
      --text:    #e5e5e5;
      --muted:   #737373;
      --dim:     #404040;
      --accent:  #5E6AD2;
      --red:     #e05252;
      --green:   #4caf7d;
      --arabic-font: 'Amiri', serif;
      --ui-font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--ui-font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      padding: 0 16px;
      height: 44px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text);
    }

    .logo em {
      font-style: normal;
      color: var(--muted);
    }

    /* ── Panels ── */
    .panels {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 36px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-size: 0.6875rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel-actions { display: flex; gap: 4px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: none;
      color: var(--muted);
      font-family: var(--ui-font);
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-mic.recording {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      animation: pulse 1.2s ease-in-out infinite;
    }

    /* ── Translate strip ── */
    .translate-strip {
      flex-shrink: 0;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }

    .btn-translate {
      width: 100%;
      padding: 7px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--ui-font);
      transition: opacity 0.1s;
    }
    .btn-translate:hover  { opacity: 0.88; }
    .btn-translate:active { opacity: 0.72; }

    /* ── Divider ── */
    .divider {
      flex-shrink: 0;
      height: 28px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--dim);
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Textareas ── */
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 16px;
      font-size: 1rem;
      line-height: 1.65;
      color: var(--text);
      resize: none;
      min-height: 0;
      width: 100%;
      font-family: var(--ui-font);
    }
    textarea::placeholder { color: var(--dim); }

    textarea[dir="rtl"] {
      font-family: var(--arabic-font);
      font-size: 1.2rem;
      line-height: 1.9;
    }

    textarea[readonly] { color: #93c5fd; cursor: default; }

    /* ── Status bar ── */
    .status-bar {
      flex-shrink: 0;
      padding: 3px 16px;
      font-size: 0.6875rem;
      color: var(--dim);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      min-height: 22px;
      gap: 6px;
    }
    .status-bar.error   { color: var(--red); }
    .status-bar.success { color: var(--green); }
    .status-bar.loading { color: var(--muted); }

    .char-count { margin-left: auto; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 9px; height: 9px;
      border: 1.5px solid var(--border2);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.7; }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      header { padding: 0 12px; }
      .panel-header, .translate-strip { padding-left: 12px; padding-right: 12px; }
      textarea { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Sheikh Translator <em>&middot; Arabic &#x2194; English</em></div>
  <button class="btn" id="clear-btn">Clear</button>
</header>

<div class="panels">

  <!-- ARABIC INPUT -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">Arabic</span>
      <div class="panel-actions">
        <button class="btn btn-primary btn-mic" id="ar-mic-btn">Speak</button>
        <button class="btn" id="ar-tts-btn">Read</button>
        <button class="btn" id="ar-copy-btn">Copy</button>
      </div>
    </div>
    <textarea
      id="ar-text"
      placeholder="&#x627;&#x643;&#x62A;&#x628; &#x623;&#x648; &#x627;&#x646;&#x637;&#x642; &#x628;&#x627;&#x644;&#x639;&#x631;&#x628;&#x64A;&#x629;..."
      dir="rtl"
      spellcheck="false"
    ></textarea>
    <div class="translate-strip">
      <button class="btn-translate" id="translate-btn">Translate to English</button>
    </div>
    <div class="status-bar" id="ar-status">
      <span id="ar-status-text"></span>
      <span class="char-count" id="ar-char-count">0</span>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
    </svg>
    Arabic to English
  </div>

  <!-- ENGLISH OUTPUT -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">English</span>
      <div class="panel-actions">
        <button class="btn" id="en-tts-btn">Read</button>
        <button class="btn" id="en-copy-btn">Copy</button>
      </div>
    </div>
    <textarea
      id="en-text"
      placeholder="Translation will appear here..."
      dir="ltr"
      spellcheck="false"
      readonly
    ></textarea>
    <div class="translate-strip">
      <button class="btn-translate" id="translate-to-ar-btn">Translate to Arabic</button>
    </div>
    <div class="status-bar" id="en-status">
      <span id="en-status-text"></span>
      <span class="char-count" id="en-char-count">0</span>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
